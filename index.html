<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona 5 Team | Ciclismo Aficionado</title>
    <style>
        /* Paleta de colores basada en el logo */
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --primary-blue: #229fd9;
            /* Azul del logo */
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
        }

        /* Navegación */
        header {
            background-color: #000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-blue);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            font-style: italic;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--primary-blue);
        }

        nav a {
            color: var(--text-white);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--primary-blue);
        }

        /* Secciones Generales */
        section {
            padding: 4rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Tarjetas de Eventos */
        .grid-eventos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .evento-card {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            border-left: 5px solid var(--primary-blue);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .evento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(34, 159, 217, 0.2);
        }

        .evento-fecha {
            color: var(--primary-blue);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .evento-titulo {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .evento-badge {
            display: inline-block;
            background-color: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        /* Tabla de Clasificación */
        .tabla-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: var(--primary-blue);
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
        }

        tr:hover {
            background-color: #2a2a2a;
        }

        .rank-1 {
            color: gold;
            font-weight: bold;
        }

        .rank-2 {
            color: silver;
            font-weight: bold;
        }

        .rank-3 {
            color: #cd7f32;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                display: none;
            }

            /* En móvil simplificamos el header por ahora */
            .logo {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Z<span>5</span> TEAM</div>
        <nav>
            <a href="#eventos">Chequeos 2026</a>
            <a href="#clasificacion">Clasificación General</a>
        </nav>
    </header>

    <section id="eventos">
        <h2>Chequeos 2026</h2>
        <div class="grid-eventos" id="contenedor-eventos">
        </div>
    </section>

    <section id="clasificacion">
        <h2>Clasificación General 2026</h2>
        <div class="tabla-container">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Ciclista</th>
                        <th>Puntos Totales</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                </tbody>
            </table>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script>

        // --- RENDERIZAR EVENTOS ---
        const contenedorEventos = document.getElementById('contenedor-eventos');
        eventos.forEach((ev, index) => {
            const card = document.createElement('div');
            card.className = 'evento-card';
            card.onclick = () => window.location.href = `evento.html?id=${ev.id}`;
            card.innerHTML = `
                <div class="evento-fecha">🗓️ ${ev.fecha}</div>
                <h3 class="evento-titulo">${ev.evento}</h3>
                <div class="evento-badge">🚲 ${ev.modalidad}</div>
                <p style="color: var(--text-gray); font-size: 0.9rem;">Clic para ver detalles y segmentos</p>
            `;
            contenedorEventos.appendChild(card);
        });

        // --- RENDERIZAR CLASIFICACIÓN ---
        const cuerpoTabla = document.getElementById('cuerpo-tabla');
        // Ordenar miembros por puntos (descendente)
        miembros.sort((a, b) => b.puntos - a.puntos);

        miembros.forEach((miembro, index) => {
            let rankClass = '';
            let corona = '';
            if (index === 0) { rankClass = 'rank-1'; corona = ' 🥇'; }
            if (index === 1) { rankClass = 'rank-2'; corona = ' 🥈'; }
            if (index === 2) { rankClass = 'rank-3'; corona = ' 🥉'; }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="${rankClass}">#${index + 1}</td>
                <td style="font-weight: 500;">${miembro.nombre}${corona}</td>
                <td style="font-weight: bold; color: var(--primary-blue);">${miembro.puntos} pts</td>
            `;
            cuerpoTabla.appendChild(tr);
        });

    </script>
</body>

</html>
